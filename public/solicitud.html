<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoWeb - Solicitud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/ludoweb/home.html">
                <img src="/ludoweb/img/logo.png" alt="Logo LudoWeb" style="height: 35px; width: auto; margin-right: 10px;">
                LudoWeb
            </a>
            <a href="catalogo.html" class="btn btn-sm btn-light">← Volver al catálogo</a>
        </div>
    </nav>

    <main class="container my-5" style="max-width: 700px;">
        <h2 class="fw-bold mb-4">Finalizar Solicitud</h2>
        
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-white fw-bold">1. Juegos Seleccionados</div>
            <ul class="list-group list-group-flush">
                </ul>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white fw-bold">2. Datos del Préstamo</div>
            <div class="card-body">
                <form id="form-solicitud">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre Completo</label>
                        <input type="text" id="nombre_cliente" class="form-control" placeholder="Nombre del cliente" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Número de Jugadores *</label>
                        <input type="number" id="numero_jugadores" class="form-control" placeholder="Ej. 4" min="1" required>
                    </div>
                    <div class="form-check p-3 bg-light rounded border mb-4 ms-0">
                        <input class="form-check-input ms-1 me-2" type="checkbox" id="apoyo">
                        <label class="form-check-label fw-bold text-primary ms-4" for="apoyo">
                            ¿Necesitas apoyo del personal?
                        </label>
                        <p class="small text-muted mb-0 ms-4">Marca si requieres explicación de las reglas en sala.</p>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">Enviar Solicitud</button>
                </form>
            </div>
        </div>
    </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script src="solicitud.js"></script> 
</body>
</html>
