<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoWeb - Panel Personal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/ludoweb/home.html">
                <img src="/ludoweb/img/logo.png" alt="Logo LudoWeb" style="height: 35px; width: auto; margin-right: 10px;">
                LudoWeb
            </a>
	    <a href="agregar_juego.html" class="btn btn-success fw-bold mb-3">+ Agregar Nuevo Juego</a>
            <span class="navbar-text text-warning small fw-bold">Panel de Personal</span>
        </div>
    </nav>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold mb-0">Solicitudes de Préstamo Registradas</h1>
            <a href="home.html" class="btn btn-sm btn-outline-secondary">Volver al Inicio</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Código</th>
                            <th>Cliente</th>
                            <th>Juegos</th>
                            <th class="text-center">Apoyo</th>
                            <th>Estado</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-solicitudes-cuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="consulta_solicitudes.js"></script>
</body>
</html>
